server {
    listen 80;
    server_name _;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # Health check for the load balancer / target group
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://vitalink_backend;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (Server-Sent Events) - critical for VitaLink notifications
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;   # 24h for SSE streams
        proxy_send_timeout 86400s;

        # Timeouts for regular requests
        proxy_connect_timeout 10s;
    }
}

